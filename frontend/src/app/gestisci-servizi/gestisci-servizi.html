<div class="gestisci-page">

  <!-- Header -->
  <div class="gestisci-header-band">
    <div>
      <h2>Gestione Servizi</h2>
      <div class="divider-gold"></div>
      <p>Aggiungi, modifica o rimuovi i servizi aggiuntivi dell'hotel</p>
    </div>
    <button class="back-link" routerLink="/amministrazione">← Pannello admin</button>
  </div>

  <!-- Body -->
  <div class="gestisci-wrapper">

    <div class="actions-bar">
      <div class="actions-bar-left">
        <div class="search-input">
          <input type="search" placeholder="Cerca servizio...">
        </div>
      </div>
      <div class="actions-bar-right">
        <button class="btn-add">+ Nuovo servizio</button>
      </div>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome servizio</th>
            <th>Descrizione</th>
            <th>Prezzo (€)</th>
            <th>Disponibile</th>
            <th>Azioni</th>
          </tr>
        </thead>
        <tbody>
          <!-- Righe dinamiche Angular -->
        </tbody>
      </table>
    </div>

  </div>
</div>
