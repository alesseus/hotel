<header>
  <a routerLink="/" class="logo-link">
    <img src="assets/images/logo.png"  alt="Blue Horizon Hotel" class="logo">
  </a>

  <nav>
    <a routerLink="/"          routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
    <a routerLink="/servizi"   routerLinkActive="active">Servizi</a>
    <a routerLink="/storia"    routerLinkActive="active">Storia</a>
    <a routerLink="/dovesiamo" routerLinkActive="active">Come raggiungerci</a>
  </nav>

  <a class="btn-hero-ghost" *ngIf="!isLoggedIn" routerLink="/login">Login</a>

  <ng-container *ngIf="isLoggedIn">
    <a class="btn-hero-ghost" *ngIf="isAdmin"  routerLink="/amministrazione">Amministrazione</a>
    <a class="btn-hero-ghost" *ngIf="!isAdmin" routerLink="/prenotazioni">Le mie prenotazioni</a>
    <a class="btn-hero-ghost" (click)="logout()">Logout</a>
  </ng-container>

  <button class="btn-prenota" routerLink="/prenotazione">Prenota</button>
</header>

<main>
  <router-outlet></router-outlet>
</main>

<footer>
  <div class="footer-inner">
    <p id="contatti" routerLink="/contatti">Contatti</p>
    <span class="footer-sep">·</span>
    <span class="footer-copy">© 2026 Blue Horizon Hotel · Porto Cervo</span>
  </div>
  <div class="footer-contacts">
    <span>Via della Marina, 104 – 07021 Arzachena OT</span>
    <span class="footer-sep">·</span>
    <span>+39 0789 92356</span>
    <span class="footer-sep">·</span>
    <span>info@bluehorizonhotel.it</span>
  </div>
</footer>
