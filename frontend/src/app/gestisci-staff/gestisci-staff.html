<div class="gestisci-page">

  <!-- Header -->
  <div class="gestisci-header-band">
    <div>
      <h2>Gestione Staff</h2>
      <div class="divider-gold"></div>
      <p>Gestisci il personale e le relative mansioni</p>
    </div>
    <button class="back-link" routerLink="/amministrazione">Pannello admin</button>
  </div>

  <!-- Body -->
  <div class="gestisci-wrapper">

    <div class="actions-bar">
      <div class="actions-bar-left">
        <div class="search-input">
          <input type="search" placeholder="Cerca membro staff...">
        </div>
      </div>
      <div class="actions-bar-right">
        <button class="btn-add">+ Aggiungi membro</button>
      </div>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Cognome</th>
            <th>Ruolo</th>
            <th>Email</th>
            <th>Telefono</th>
            <th>Azioni</th>
          </tr>
        </thead>
        <tbody>
          <!-- Righe dinamiche Angular -->
        </tbody>
      </table>
    </div>

  </div>
</div>
