<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title2 desc2">
  <title id="title2">Blue Horizon - Emblem (updated)</title>
  <desc id="desc2">Emblema circolare semplificato: sole semicircolare, linea d'orizzonte e onda, blu su sfondo bianco.</desc>
  <rect width="100%" height="100%" fill="#FFFFFF"/>
  <g transform="translate(512,512)">
    <circle r="460" fill="#FFFFFF" stroke="#0B63B8" stroke-width="24"/>
    <!-- sun semicircle -->
    <path d="M-220 0 A220 220 0 0 1 220 0 L220 60 L-220 60 Z" fill="#0B63B8"/>
    <!-- horizon line -->
    <rect x="-420" y="80" width="840" height="18" rx="9" fill="#0B63B8" />
    <!-- single smooth wave below -->
    <path d="M-380 180 C-260 120 -140 120 -20 180 C100 240 220 240 340 180" fill="none" stroke="#0B63B8" stroke-width="22" stroke-linecap="round"/>
  </g>
</svg>
