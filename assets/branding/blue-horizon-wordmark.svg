<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="400" viewBox="0 0 1600 400" role="img" aria-labelledby="title desc">
  <title id="title">Blue Horizon - Wordmark (updated)</title>
  <desc id="desc">Logo moderno con wordmark molto grande e icona semplice (sole + orizzonte + onda) in blu su sfondo bianco.</desc>
  <rect width="100%" height="100%" fill="#FFFFFF"/>
  <!-- Icon (left): simple sun + horizon line + subtle wave -->
  <g transform="translate(80,50)">
    <!-- sun (semi) -->
    <path d="M120 80 A60 60 0 0 1 0 80 L0 110 L240 110 L240 80 A60 60 0 0 1 120 80 Z" fill="#0B63B8"/>
    <!-- horizon line -->
    <rect x="-20" y="120" width="280" height="8" rx="4" fill="#0B63B8" />
    <!-- gentle wave -->
    <path d="M-40 160 C20 120 80 120 140 160 C200 200 260 200 320 160" fill="none" stroke="#0B63B8" stroke-width="10" stroke-linecap="round"/>
  </g>
  <!-- Wordmark (large) -->
  <g transform="translate(360,240)">
    <text x="0" y="0" font-family="Montserrat, Poppins, system-ui, Arial, sans-serif" font-weight="800" font-size="140" fill="#0B63B8">Blue</text>
    <text x="430" y="0" font-family="Montserrat, Poppins, system-ui, Arial, sans-serif" font-weight="500" font-size="140" fill="#0B63B8">Horizon</text>
  </g>
</svg>
