<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200" role="img" aria-labelledby="title desc">
  <title id="title">Blue Horizon - Wordmark</title>
  <desc id="desc">Logo moderno con icona a onda e testo "Blue Horizon" in blu su sfondo bianco.</desc>
  <rect width="100%" height="100%" fill="#FFFFFF"/>
  <!-- Icon: stylized wave + horizon -->
  <g transform="translate(60,40)" fill="none" stroke="#0B63B8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0,60 C30,20 70,20 100,60 C130,100 170,100 200,60" />
    <line x1="0" y1="90" x2="200" y2="90" stroke="#0B63B8" stroke-width="4" />
  </g>
  <!-- Wordmark -->
  <g transform="translate(280,120)">
    <text x="0" y="0" font-family="Montserrat, Poppins, system-ui, Arial, sans-serif" font-weight="700" font-size="48" fill="#0B63B8">Blue</text>
    <text x="150" y="0" font-family="Montserrat, Poppins, system-ui, Arial, sans-serif" font-weight="400" font-size="48" fill="#0B63B8">Horizon</text>
  </g>
</svg>
